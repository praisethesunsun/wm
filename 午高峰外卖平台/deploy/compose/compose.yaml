version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: lunch_rush
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: ../../
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/lunch_rush
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: ../../
      dockerfile: Dockerfile
    command: ["npx", "tsx", "apps/api/src/worker.ts"]
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/lunch_rush
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - app

volumes:
  mysql_data:
