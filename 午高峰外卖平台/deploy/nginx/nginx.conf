worker_processes 1;

events { 
    worker_connections 1024; 
}

http {
    upstream backend {
        server app:3000;
        # server app2:3000; # For horizontal scaling demonstration
    }

    server {
        listen 80;
        
        # 接口转发 (API Routing)
        location /api/ {
            proxy_pass http://backend/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # 商家端 H5 (Merchant Web)
        location /merchant {
            proxy_pass http://backend/merchant;
            proxy_set_header Host $host;
        }

        # C端 H5 及其他全部回源 (Customer H5 & Vite Assets)
        location / {
            proxy_pass http://backend/;
            proxy_set_header Host $host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
